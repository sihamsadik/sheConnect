spring.application.name=SheConnect

# Default (dev) database: in-memory H2 so the app can start without Postgres.
spring.datasource.url=jdbc:h2:mem:sheconnect;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# To use Postgres instead, run with profile `postgres`:
# `mvn spring-boot:run -Dspring-boot.run.profiles=postgres`

jwt.secret=mysupersecretkeymysupersecretkey
jwt.expiration =3600000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
