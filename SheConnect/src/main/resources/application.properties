spring.application.name=SheConnect

# Default database - H2
spring.datasource.url=jdbc:h2:mem:sheconnect;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT - Use environment variable
jwt.secret=${JWT_SECRET:mysupersecretkey}  # ← Changed this!
jwt.expiration=360000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect