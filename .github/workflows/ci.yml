name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build with Maven
      run: cd SheConnect && ./mvnw -B -ntp clean verify
      env:
        # Avoid depending on external services in CI; tests use the default in-memory H2 datasource
        JWT_SECRET: mysupersecretkey
